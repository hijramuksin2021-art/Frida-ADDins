<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FRIDA</title>
  <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
  <link rel="stylesheet" href="taskpane.css" />
</head>
<body>
  <header>
    <img src="assets/frida-logo.png" alt="FRIDA" class="logo" />
    <h1>FRIDA</h1>
    <p class="sub">Agen Word — beri perintah, FRIDA yang mengerjakan</p>
  </header>

  <main>
    <div id="log" class="log">
      <div class="msg assistant">
        Halo, saya FRIDA. Contoh perintah:<br />
        • Buat semua heading biru ukuran 18.<br />
        • Ganti semua "Company A" jadi "Company B".<br />
        • Tebalkan teks yang sedang saya blok.
      </div>
    </div>

    <div id="status" class="status"></div>
    <button id="undo" class="undo" style="display:none">↩️ Undo perubahan terakhir</button>
    <div id="audit" class="audit"></div>

    <div class="composer">
      <textarea id="instruction" rows="3"
        placeholder="Tulis perintah untuk FRIDA… (Ctrl+Enter untuk kirim)"></textarea>
      <label class="check"><input type="checkbox" id="previewToggle" checked />
        Tinjau dampak sebelum menerapkan</label>
      <button id="send" class="primary">Kirim</button>
      <p class="hint">Tips: blok dulu bagian yang dimaksud bila perintah menyebut "ini" / "di sini".</p>
    </div>
  </main>

  <!-- Registry tool + lapisan keselamatan (sumber kebenaran bersama dgn server). -->
  <!-- Muat SEBELUM taskpane.js. -->
  <script src="tools/schemas.js"></script>
  <script src="tools/handlers.js"></script>
  <script src="tools/safety.js"></script>
  <script src="taskpane.js"></script>
</body>
</html>
